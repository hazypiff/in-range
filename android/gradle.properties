org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
# This newDsl flag was added by the Flutter template
android.newDsl=false
# This builtInKotlin flag was added by the Flutter template
android.builtInKotlin=false

# Workarounds for older plugins (flutter_ble_peripheral, background_service, geolocator)
# with Gradle 8+/9 + strict task state tracking
kotlin.incremental=false
org.gradle.caching=false
org.gradle.parallel=false
# Still ignore residual JVM-target mismatches from legacy plugins if any slip through
kotlin.jvm.target.validation.mode=IGNORE
# App + root build.gradle.kts force Java/Kotlin 17 everywhere
