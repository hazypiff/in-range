name: in_range
description: "In Range - Real Encounters. Real Connections. (Flutter + Supabase)"
publish_to: 'none'

version: 0.1.0+1

environment:
  sdk: '>=3.6.0 <4.0.0'
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter

  # Backend & State (core to Phase 0)
  supabase_flutter: ^2.8.0
  flutter_riverpod: ^2.6.1

  # BLE + Location (per 2026 research - flutter_blue_plus preferred)
  flutter_blue_plus: ^2.3.10
  flutter_ble_peripheral: ^2.1.1   # For advertising ephemeral tokens
  geolocator: ^13.0.2
  geocoding: ^4.0.0
  permission_handler: ^11.3.1
  flutter_dotenv: ^5.2.1

  # Foreground service for reliable background BLE/GPS (required on modern Android)
  flutter_background_service: ^5.0.0
  flutter_background_service_android: ^6.0.0

  # Crypto + Utils
  crypto: ^3.0.6
  uuid: ^4.5.1
  shared_preferences: ^2.5.5
  path: ^1.9.1
  image: ^4.5.4
  sqflite: ^2.4.3
  image_picker: ^1.2.3
  path_provider: ^2.1.6
  flutter_local_notifications: ^22.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  fake_async: ^1.3.1 # deterministic Timer control for ClaimManager retry tests

  # Code generation
  build_runner: ^2.4.15
  riverpod_generator: ^2.6.1
  freezed: ^2.5.7
  json_serializable: ^6.8.0   # If using json models

flutter:
  uses-material-design: true

  assets:
    # Required: reproducible CI/clone builds. Optional local secrets via .env
    # are loaded when present in the asset bundle (gitignored — add only for
    # device builds: flutter build with a copied .env, or use --dart-define).
    - .env.example
